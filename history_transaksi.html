<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History Transaksi — GreenBite</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-dark: #1a4a2e;
      --green-mid: #2d7a4f;
      --green-lime: #5cb85c;
      --green-light: #e8f5e9;
      --accent: #f4a724;
      --bg: #f5f5f0;
      --white: #ffffff;
      --gray: #6b7280;
      --text: #1a1a1a;
      --red: #ef4444;
      --blue: #2563eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); }

    /* NAV */
    nav {
      background: var(--white); padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 0 #e5e7eb;
    }
    .nav-logo { font-weight: 800; font-size: 1.4rem; color: var(--green-dark); text-decoration: none; }
    .nav-logo span { color: var(--green-lime); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--gray); font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--green-dark); }
    .btn-shop {
      background: var(--green-dark); color: #fff; border: none;
      padding: 0.5rem 1.2rem; border-radius: 50px; font-family: 'Poppins', sans-serif;
      font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
    }
    .btn-shop:hover { background: var(--green-mid); }

    /* BREADCRUMB */
    .breadcrumb { padding: 1rem 5%; font-size: 0.82rem; color: var(--gray); }
    .breadcrumb a { color: var(--green-mid); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* HEADER */
    .page-header { padding: 0 5% 1.5rem; max-width: 1100px; margin: 0 auto; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--green-dark); margin-bottom: 0.4rem; }
    .page-header p { font-size: 0.88rem; color: var(--gray); }

    /* CONTENT */
    .content { padding: 0 5% 3rem; max-width: 1100px; margin: 0 auto; }

    /* FILTER TABS */
    .filter-tabs {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
      background: var(--white); padding: 0.5rem; border-radius: 50px; width: fit-content;
    }
    .filter-tab {
      padding: 0.5rem 1.2rem; border-radius: 50px; border: none;
      background: none; font-family: 'Poppins', sans-serif; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s; color: var(--gray); white-space: nowrap;
    }
    .filter-tab.active { background: var(--green-dark); color: #fff; font-weight: 600; }

    /* SEARCH */
    .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-box {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--white); border: 1.5px solid #e5e7eb;
      border-radius: 50px; padding: 0.6rem 1.1rem; flex: 1; min-width: 220px;
    }
    .search-box input { border: none; background: none; outline: none; font-family: 'Poppins', sans-serif; font-size: 0.88rem; width: 100%; }

    /* TRANSACTION CARD */
    .trx-list { display: flex; flex-direction: column; gap: 1rem; }
    .trx-card { background: var(--white); border-radius: 18px; overflow: hidden; }
    .trx-header {
      padding: 1rem 1.25rem; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid #f3f4f6; flex-wrap: wrap; gap: 0.5rem;
    }
    .trx-id { font-size: 0.78rem; color: var(--gray); }
    .trx-id strong { color: var(--green-dark); }
    .trx-date { font-size: 0.78rem; color: var(--gray); }
    .status-badge {
      padding: 0.3rem 0.85rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700;
    }
    .status-waiting { background: #fef9c3; color: #ca8a04; }
    .status-processing { background: #dbeafe; color: var(--blue); }
    .status-shipping { background: #ede9fe; color: #7c3aed; }
    .status-done { background: #dcfce7; color: #16a34a; }
    .status-cancelled { background: #fee2e2; color: var(--red); }

    .trx-body { padding: 1.1rem 1.25rem; }
    .trx-items { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
    .trx-item { display: flex; align-items: center; gap: 0.75rem; }
    .trx-item-img{
    width:50px;
    height:50px;
    border-radius:12px;
    overflow:hidden;
    background:#f3f4f6;
    flex-shrink:0;
    }

    .trx-item-img img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }
    .trx-item-info { flex: 1; }
    .trx-item-name { font-size: 0.88rem; font-weight: 600; color: var(--green-dark); }
    .trx-item-qty { font-size: 0.75rem; color: var(--gray); }
    .trx-item-price { font-size: 0.85rem; font-weight: 700; color: var(--green-dark); white-space: nowrap; }
    .trx-more { font-size: 0.78rem; color: var(--gray); padding-left: 0.25rem; }

    /* TRACKING */
    .tracking-bar { display: flex; align-items: center; margin: 1rem 0; }
    .track-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
    .track-dot { width: 22px; height: 22px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; z-index: 2; }
    .track-dot.done { background: var(--green-lime); }
    .track-line { position: absolute; top: 11px; left: 50%; width: 100%; height: 2px; background: #e5e7eb; z-index: 1; }
    .track-line.done { background: var(--green-lime); }
    .track-step:last-child .track-line { display: none; }
    .track-label { font-size: 0.68rem; color: var(--gray); margin-top: 0.4rem; text-align: center; }
    .track-step.done .track-label { color: var(--green-mid); font-weight: 600; }

    .trx-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 1rem; border-top: 1px dashed #e5e7eb; flex-wrap: wrap; gap: 0.75rem;
    }
    .trx-total { font-size: 0.95rem; font-weight: 700; color: var(--green-dark); }
    .trx-actions { display: flex; gap: 0.5rem; }
    .btn-action {
      padding: 0.5rem 1.1rem; border-radius: 50px; font-size: 0.82rem;
      cursor: pointer; font-family: 'Poppins', sans-serif; transition: all 0.2s; border: none;
    }
    .btn-reorder { background: var(--green-dark); color: #fff; }
    .btn-reorder:hover { background: var(--green-mid); }
    .btn-detail { background: var(--white); color: var(--green-dark); border: 1.5px solid var(--green-dark) !important; }
    .btn-detail:hover { background: var(--green-light); }
    .btn-track { background: var(--green-light); color: var(--green-mid); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 4rem 2rem; display: none; }
    .empty-state .emoji { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.2rem; font-weight: 700; color: var(--green-dark); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.88rem; color: var(--gray); margin-bottom: 1.5rem; }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .content { padding: 0 4% 2rem; }
      .page-header { padding: 0 4% 1.5rem; }
      .filter-tabs { width: 100%; overflow-x: auto; }
      .trx-footer { flex-direction: column; align-items: flex-start; }
      .trx-actions { width: 100%; }
      .btn-action { flex: 1; text-align: center; }
    }
  
    /* Hamburger mobile nav (auto-added) */
    .hamburger-btn { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; z-index: 210; }
    .hamburger-btn span { width: 22px; height: 2px; background: var(--green-dark, #1a4a2e); border-radius: 2px; transition: 0.3s; display: block; }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 768px) {
      .hamburger-btn { display: flex; }
      .nav-links.mobile-open {
        display: flex !important; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0;
        background: #fff; padding: 1.25rem 6%; gap: 1rem; box-shadow: 0 8px 24px rgba(0,0,0,0.08); z-index: 150;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">GREEN<span>BITE</span></a>
    <ul class="nav-links">
      <li><a href="#">Fitur</a></li>
      <li><a href="#">Harga</a></li>
      <li><a href="#">Tentang</a></li>
      <li><a href="arsip_artikel.html">Blog</a></li>
    </ul>
      <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    <button class="btn-shop" onclick="window.location.href='katalog_produk.html'">Belanja Lagi</button>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="index.html">Beranda</a> › <span>History Transaksi</span>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <h1>📋 History Transaksi</h1>
    <p>Lihat dan lacak semua pesananmu di GreenBite</p>
  </div>

  <div class="content">
    <!-- SEARCH -->
    <div class="search-row">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="Cari nomor pesanan atau produk..." id="searchInput" oninput="filterTrx()"/>
      </div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterStatus('semua', this)">Semua</button>
      <button class="filter-tab" onclick="filterStatus('Menunggu', this)">Menunggu</button>
      <button class="filter-tab" onclick="filterStatus('Diproses', this)">Diproses</button>
      <button class="filter-tab" onclick="filterStatus('Dikirim', this)">Dikirim</button>
      <button class="filter-tab" onclick="filterStatus('Selesai', this)">Selesai</button>
    </div>

    <!-- TRANSACTION LIST -->
    <div class="trx-list" id="trxList"></div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="emoji">📦</div>
      <h3>Belum Ada Transaksi</h3>
      <p>Yuk mulai pesan makanan sehat favoritmu!</p>
      <button class="btn-shop" onclick="window.location.href='katalog_produk.html'">Mulai Belanja</button>
    </div>
  </div>

  <script>
    const transactions = [
      {
        id: "GB-2025-0124", date: "18 Mei 2025, 14:30", status: "Selesai",
        items: [
          { name: "Green Goddess Salad", qty: 2, price: 90000, img:"salad.jpg" },
          { name: "Berry Blast Smoothie", qty: 1, price: 35000, img:"berry.jpg" },
        ],
        total: 125000, step: 4
      },
      {
        id: "GB-2025-0118", date: "15 Mei 2025, 09:12", status: "Dikirim",
        items: [
          { name: "Protein Chicken Bowl", qty: 1, price: 52000, img:"chickenbowl.jpg" },
          { name: "Green Detox Juice", qty: 2, price: 60000, img:"greendetox.jpg" },
        ],
        total: 112000, step: 3
      },
      {
        id: "GB-2025-0109", date: "10 Mei 2025, 18:45", status: "Diproses",
        items: [
          { name: "Vitamin C Booster", qty: 1, price: 120000, img:"vitaminc.jpg" },
        ],
        total: 120000, step: 2
      },
      {
        id: "GB-2025-0102", date: "8 Mei 2025, 11:20", status: "Menunggu",
        items: [
          { name: "Avocado Toast Box", qty: 3, price: 96000, img:"avocadotoast.jpg" },
          { name: "Caesar Salad Premium", qty: 1, price: 42000, img:"saladchiken.jpg" },
        ],
        total: 138000, step: 1
      },
      {
        id: "GB-2025-0087", date: "2 Mei 2025, 16:00", status: "Selesai",
        items: [
          { name: "Rainbow Veggie Bowl", qty: 2, price: 96000, img:"rainbowveggie.jpg" },
        ],
        total: 96000, step: 4
      },
      {
        id: "GB-2025-0071", date: "25 Apr 2025, 13:15", status: "Selesai",
        items: [
          { name: "Omega-3 Fish Bowl", qty: 1, price: 58000, img:"omega3.jpg" },
          { name: "Collagen Supplement", qty: 1, price: 185000, img:"collagen.jpg" },
        ],
        total: 243000, step: 4
      },
    ];

    let activeStatus = 'semua';
    let activeSearch = '';

    const statusClass = {
      "Menunggu": "status-waiting",
      "Diproses": "status-processing",
      "Dikirim": "status-shipping",
      "Selesai": "status-done",
    };

    const trackSteps = ["Dipesan", "Diproses", "Dikirim", "Selesai"];

    function renderTracking(currentStep) {
      return trackSteps.map((label, i) => {
        const stepNum = i + 1;
        const done = stepNum <= currentStep;
        return `
          <div class="track-step ${done ? 'done' : ''}">
            ${i < trackSteps.length - 1 ? `<div class="track-line ${stepNum < currentStep ? 'done' : ''}"></div>` : ''}
            <div class="track-dot ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
            <div class="track-label">${label}</div>
          </div>
        `;
      }).join('');
    }

    function renderTrx(list) {
      const container = document.getElementById('trxList');
      const empty = document.getElementById('emptyState');

      if (list.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      container.innerHTML = list.map(trx => {
        const itemsToShow = trx.items.slice(0, 2);
        const moreCount = trx.items.length - 2;

        return `
        <div class="trx-card">
          <div class="trx-header">
            <div>
              <div class="trx-id">No. Pesanan: <strong>#${trx.id}</strong></div>
              <div class="trx-date">${trx.date}</div>
            </div>
            <span class="status-badge ${statusClass[trx.status]}">${trx.status}</span>
          </div>
          <div class="trx-body">
            <div class="trx-items">
              ${itemsToShow.map(item => `
                <div class="trx-item">
                  <div class="trx-item-img"><img src="images/${item.img}" alt="${item.name}"></div>
                  <div class="trx-item-info">
                    <div class="trx-item-name">${item.name}</div>
                    <div class="trx-item-qty">x${item.qty}</div>
                  </div>
                  <div class="trx-item-price">Rp ${item.price.toLocaleString('id')}</div>
                </div>
              `).join('')}
              ${moreCount > 0 ? `<div class="trx-more">+${moreCount} produk lainnya</div>` : ''}
            </div>

            ${trx.status !== 'Menunggu' ? `<div class="tracking-bar">${renderTracking(trx.step)}</div>` : ''}

            <div class="trx-footer">
              <div class="trx-total">Total: Rp ${trx.total.toLocaleString('id')}</div>
              <div class="trx-actions">
                <button class="btn-action btn-detail" onclick="showDetail('${trx.id}')">Lihat Detail</button>
                <button class="btn-action btn-reorder" onclick="reorder('${trx.id}')">🔄 Pesan Ulang</button>
              </div>
            </div>
          </div>
        </div>
        `;
      }).join('');
    }

    function getFiltered() {
      return transactions.filter(t => {
        const matchStatus = activeStatus === 'semua' || t.status === activeStatus;
        const matchSearch = t.id.toLowerCase().includes(activeSearch.toLowerCase()) ||
          t.items.some(i => i.name.toLowerCase().includes(activeSearch.toLowerCase()));
        return matchStatus && matchSearch;
      });
    }

    function filterStatus(status, el) {
      activeStatus = status;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderTrx(getFiltered());
    }

    function filterTrx() {
      activeSearch = document.getElementById('searchInput').value;
      renderTrx(getFiltered());
    }

    function showDetail(id) {
      alert('Menampilkan detail pesanan #' + id);
    }

    function reorder(id) {
      alert('Produk dari pesanan #' + id + ' ditambahkan ke keranjang!');
      window.location.href = 'keranjang.html';
    }

    renderTrx(transactions);
  </script>

  <script>
    function toggleMobileNav() {
      document.querySelector('.nav-links').classList.toggle('mobile-open');
      document.getElementById('hamburgerBtn').classList.toggle('open');
    }
  </script>
</body>
</html>
